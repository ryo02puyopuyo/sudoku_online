<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Sudoku Viewer</title>
  <style>
    table { border-collapse: collapse; margin: 20px; }
    td {
      width: 30px; height: 30px;
      text-align: center; border: 1px solid #000;
      font-size: 18px;
    }
    /* 3x3 ブロックの枠を太く */
    td:nth-child(3n) { border-right: 2px solid #000; }
    tr:nth-child(3n) td { border-bottom: 2px solid #000; }
  </style>
</head>
<body>
  <h1>Sudoku Generator</h1>
  <button onclick="sendMessage('generate')">数独を生成</button>
  <div id="board"></div>

  <script>
    const boardDiv = document.getElementById("board");
    const socket = new WebSocket("ws://localhost:8080/ws");

    socket.onopen = () => console.log("Connected");
    socket.onclose = () => console.log("Disconnected");
    socket.onerror = (err) => console.error("WebSocket Error", err);

    socket.onmessage = (event) => {
      let data;
      try {
        data = JSON.parse(event.data);
      } catch (e) {
        console.error("Invalid JSON", event.data);
        return;
      }

      // 9x9 の数独盤面なら描画
      if (Array.isArray(data) && data.length === 9) {
        renderBoard(data);
      } else if (data.error) {
        boardDiv.textContent = "Error: " + data.error;
      } else {
        boardDiv.textContent = JSON.stringify(data);
      }
    };

    function sendMessage(msg) {
      socket.send(JSON.stringify(msg));
    }

    function renderBoard(grid) {
      let html = "<table>";
      for (let r = 0; r < 9; r++) {
        html += "<tr>";
        for (let c = 0; c < 9; c++) {
          html += `<td>${grid[r][c]}</td>`;
        }
        html += "</tr>";
      }
      html += "</table>";
      boardDiv.innerHTML = html;
    }
  </script>
</body>
</html>
