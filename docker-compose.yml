# Docker Composeのファイルバージョンを指定
version: '3.8'

# 起動するサービス（コンテナ）を定義
services:
  # 'db'という名前のサービスを定義（MySQLサーバー）
  db:
    # 使用するDockerイメージを指定 (MySQLのバージョン8.0)
    image: mysql:8.0
    
    # コンテナが停止した場合に常に自動で再起動する設定
    restart: always
    
    # 環境変数の設定
    environment:
      # ルート（管理者）ユーザーのパスワード
      MYSQL_ROOT_PASSWORD: root_password
      # 作成するデータベースの名前
      MYSQL_DATABASE: sudoku_db
      # 作成する一般ユーザーの名前
      MYSQL_USER: sudoku_user
      # 作成する一般ユーザーのパスワード
      MYSQL_PASSWORD: password
    
    # ポートのマッピング設定
    ports:
      # PCの3306番ポートへのアクセスを、コンテナの3306番ポートに転送
      - "3306:3306"
      
    # データの永続化設定
    volumes:
      # 'mysql-data'という名前のボリュームにデータを保存し、コンテナを消してもデータが残るようにする
      - mysql-data:/var/lib/mysql
  # 'adminer'という名前のサービスを定義（データベース管理ツール）
  adminer:
    # Adminerの公式Dockerイメージを指定
    image: adminer
    
    # コンテナが停止した場合に常に自動で再起動する設定
    restart: always
    
    # ポートのマッピング設定
    ports:
      # PCの8081番ポートへのアクセスを、コンテナの8080番ポートに転送
      - "8081:8080"

# データの永続化に使用するボリュームを定義
volumes:
  mysql-data:
